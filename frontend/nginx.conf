server {
    listen 80;
    server_name policyhub4u.com www.policyhub4u.com;
    return 301 https://$host$request_uri; # Redirects all traffic to HTTPS
}

server {
    listen 443 ssl;
    server_name policyhub4u.com www.policyhub4u.com;

    ssl_certificate /etc/letsencrypt/live/policyhub4u.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/policyhub4u.com/privkey.pem;

    # Basic security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

# 1. REACT & GENERAL ROUTING
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # This is what makes refresh work for React!
        try_files $uri $uri/ /index.html; 
    }

    # 2. YOUR API
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. THE REAL DJANGO ADMIN (Renamed to match your urls.py)
    location /django-backend/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. DJANGO ADMIN ASSETS
    location /static/admin/ {
        alias /app/staticfiles/admin/;
    }
}
