services:
  # PostgreSQL Database
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=insure4u_db
      - POSTGRES_USER=crm_admin
      - POSTGRES_PASSWORD=Sachin10is_cricketGod
    restart: always

  # Django Backend
  backend:
    build: ./CRM
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    env_file:
      - ./CRM/.env
    depends_on:
      - db
    restart: always

  # React Frontend + Nginx
# React Frontend + Nginx
  frontend:
    build: ./frontend/insurance-crm-frontend
    ports:
      - "80:80"
      - "443:443"  # <--- Added this to allow HTTPS traffic
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro # <--- Maps your config
      - /etc/letsencrypt:/etc/letsencrypt:ro                 # <--- Maps your certificates
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume:
  
